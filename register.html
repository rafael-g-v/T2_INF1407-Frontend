<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — Acadêmico</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">
      <div class="logo-icon">A</div>
      <h1>Criar Conta</h1>
      <p>Junte-se ao Acadêmico e colabore em projetos</p>
    </div>

    <div id="alert-area"></div>

    <form id="form-register" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="nome">Nome</label>
          <input id="nome" type="text" class="form-control" placeholder="João" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="sobrenome">Sobrenome</label>
          <input id="sobrenome" type="text" class="form-control" placeholder="Silva" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">Nome de usuário</label>
        <input
          id="username"
          type="text"
          class="form-control"
          placeholder="joaosilva"
          autocomplete="username"
          required
        />
        <span class="form-hint">Usado no login. Sem espaços ou caracteres especiais.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">E-mail institucional</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="joao@aluno.puc-rio.br"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="matricula">Matrícula</label>
        <input
          id="matricula"
          type="text"
          class="form-control"
          placeholder="2300000"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input
            id="password"
            type="password"
            class="form-control"
            placeholder="min. 8 caracteres"
            autocomplete="new-password"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">Confirmar senha</label>
          <input
            id="password2"
            type="password"
            class="form-control"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
        </div>
      </div>

      <button id="btn-register" type="submit" class="btn btn-primary btn-lg btn-full">
        Criar conta
      </button>
    </form>

    <hr class="divider" />

    <p class="text-center text-sm text-muted">
      Já tem uma conta? <a href="index.html">Entrar</a>
    </p>
  </div>
</div>

<script type="module" src="js/register.js"></script>
</body>
</html>
